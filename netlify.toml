[build]
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"

[functions]
  node_bundler = "esbuild"

[dev]
  command = "npm run dev"
  port = 8888
  targetPort = 5173
  framework = "#custom"
  autoLaunch = false

# Rewrite sub-path function calls to query params (Netlify Functions don't support sub-paths)
[[redirects]]
  from = "/.netlify/functions/bookings/:id"
  to = "/.netlify/functions/bookings?id=:id"
  status = 200

[[redirects]]
  from = "/.netlify/functions/announcements/:id"
  to = "/.netlify/functions/announcements?id=:id"
  status = 200

[[redirects]]
  from = "/.netlify/functions/users/:id"
  to = "/.netlify/functions/users?id=:id"
  status = 200

# SPA fallback — must come AFTER function routes
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
